name: Windows-Installer bauen

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -m pytest -q

  installer:
    needs: tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -e ".[live,windows]" pyinstaller

      - name: PyInstaller ohne störendes Konsolenfenster
        run: >
          pyinstaller --noconfirm --clean --noconsole --name noema-tiktok-bridge
          --add-data "frontend;frontend"
          --add-data ".env.example;."
          --collect-all TikTokLive
          --collect-all edge_tts
          --collect-all aiohttp
          --collect-all multidict
          --collect-all yarl
          --collect-all frozenlist
          --collect-all aiosignal
          --collect-all certifi
          --hidden-import win32com.client
          scripts/windows_launcher.py

      - name: Version aus dem Quellcode bestimmen
        id: version
        shell: pwsh
        run: |
          $version = python -c "from app.version import __version__; print(__version__)"
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Keine Versionsnummer in app/version.py gefunden."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Baue NOEMA TikTok Live Bridge v$version"

      - name: Inno Setup bauen
        shell: cmd
        run: |
          choco install innosetup -y --no-progress
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Versionierten Installer erzeugen
        shell: pwsh
        run: |
          $source = "packaging/Output/NOEMA-TikTok-Bridge-Setup.exe"
          $target = "packaging/Output/NOEMA-TikTok-Bridge-Setup-v$env:APP_VERSION.exe"
          Copy-Item $source $target -Force
          Write-Host "Installer: $target"

      - name: Installer als Workflow-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: NOEMA-TikTok-Bridge-Setup-v${{ steps.version.outputs.version }}
          path: |
            packaging/Output/NOEMA-TikTok-Bridge-Setup.exe
            packaging/Output/NOEMA-TikTok-Bridge-Setup-v*.exe
          if-no-files-found: error

      - name: GitHub Release veröffentlichen oder aktualisieren
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: NOEMA TikTok Live Bridge v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: |
            packaging/Output/NOEMA-TikTok-Bridge-Setup.exe
            packaging/Output/NOEMA-TikTok-Bridge-Setup-v*.exe
