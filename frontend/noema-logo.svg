<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NOEMA Live Bridge">
  <defs>
    <linearGradient id="gold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#f4b23a"/>
      <stop offset="1" stop-color="#ffd86a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(244,178,58,0.55)"/>
      <stop offset="0.55" stop-color="rgba(61,139,255,0.35)"/>
      <stop offset="1" stop-color="rgba(52,216,232,0.45)"/>
    </linearGradient>
  </defs>

  <!-- dunkle Kachel mit Verlaufskante -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#0c0d10" stroke="url(#edge)" stroke-width="2"/>

  <!-- Sprechblase (Chat-Eingang), blau umrissen -->
  <path d="M13 18.5
           a5.5 5.5 0 0 1 5.5 -5.5
           h13
           a5.5 5.5 0 0 1 5.5 5.5
           v9
           a5.5 5.5 0 0 1 -5.5 5.5
           h-8.2
           l-6.3 6.2
           v-6.4
           a5.5 5.5 0 0 1 -4 -5.3
           z"
        fill="none" stroke="#6fb0ff" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- Klangwellen (TTS-Ausgang), goldene Balken -->
  <g fill="url(#gold)">
    <rect x="27" y="40" width="4.6" height="10" rx="2.3"/>
    <rect x="34.4" y="34" width="4.6" height="16" rx="2.3"/>
    <rect x="41.8" y="28" width="4.6" height="22" rx="2.3"/>
    <rect x="49.2" y="36" width="4.6" height="14" rx="2.3"/>
  </g>

  <!-- KITT-Funke -->
  <rect x="13" y="47.4" width="9" height="2.6" rx="1.3" fill="#34d8e8" opacity="0.85"/>
</svg>
